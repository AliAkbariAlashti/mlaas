services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mlaas
      POSTGRES_USER: mlaas
      POSTGRES_PASSWORD: mlaas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlaas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    environment: &backend_environment
      POSTGRES_DB: mlaas
      POSTGRES_USER: mlaas
      POSTGRES_PASSWORD: mlaas
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OTP_CACHE_URL: redis://redis:6379/2
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A mlaas worker -l info
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
    volumes:
      - media_data:/app/media
    depends_on:
      web:
        condition: service_started

  beat:
    build: .
    command: celery -A mlaas beat -l info
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
    volumes:
      - media_data:/app/media
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  media_data:
