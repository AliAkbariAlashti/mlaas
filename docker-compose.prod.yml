name: mlaas

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    environment: &backend_environment
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_SECURE: "true"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},web,localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${DOMAIN}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OTP_CACHE_URL: redis://redis:6379/2
      TIME_ZONE: ${TIME_ZONE:-Asia/Tehran}
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "true"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/schema/', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: celery -A mlaas worker -l info
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    volumes:
      - media_data:/app/media
    depends_on:
      web:
        condition: service_healthy

  beat:
    build: .
    restart: unless-stopped
    command: celery -A mlaas beat -l info
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    volumes:
      - media_data:/app/media
    depends_on:
      web:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  caddy_data:
  caddy_config:
